[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "juniper-recurrence-model"
dynamic = ["version"]
description = "Δt-native Legendre Memory Unit (Approach-C) and recurrent model core for the juniper-recurrence application"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Paul Calnon" }]
keywords = ["juniper", "recurrence", "lmu", "legendre", "state-space", "time-series", "irregular-dt"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

# numpy at the core: the LMU memory is a fixed linear recurrence (the A/B matrices
# are closed-form and never trained) and FixedOrderLMURegressor fits its readout in
# closed form, so no autodiff framework is required. juniper-model-core supplies the
# shared TrainableModel / ModelSerializer contract (and the conformance kit used in
# tests). A torch-backed read-in/readout would only arrive for a BPTT variant.
dependencies = [
    "numpy>=1.24",
    "juniper-model-core>=0.1.0,<0.2.0",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

[project.urls]
Homepage = "https://github.com/pcalnon/juniper-recurrence"
Repository = "https://github.com/pcalnon/juniper-recurrence"
Issues = "https://github.com/pcalnon/juniper-recurrence/issues"

[tool.setuptools.dynamic]
version = { attr = "juniper_recurrence_model._version.__version__" }

[tool.setuptools.packages.find]
include = ["juniper_recurrence_model*"]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = ["-ra", "-q", "--strict-markers", "--strict-config"]

[tool.ruff]
line-length = 512
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "B", "I", "N"]

[tool.ruff.lint.pep8-naming]
# `X` / `X_val` are the universal ML feature-matrix names and are fixed by the
# juniper-model-core `TrainableModel` ABC signature this package overrides verbatim,
# so allow them as argument / variable names (suppresses N803 / N806 for these only).
extend-ignore-names = ["X", "X_val"]

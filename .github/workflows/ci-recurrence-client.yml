---
#####################################################################################################################################################################################################
# Project:       Juniper
# Application:   juniper-recurrence-client (subdirectory of juniper-recurrence)
# File Name:     ci-recurrence-client.yml
# Author:        Paul Calnon
#
# Date Created:  2026-06-18
#
# License:       MIT License
# Copyright:     Copyright (c) 2026 Paul Calnon
#
# Description:
#    CI pipeline for the juniper-recurrence-client package (the HTTP client for the
#    juniper-recurrence service). Runs on PRs and pushes that touch the package or this
#    workflow. Path-scoped so it gates independently of ci-recurrence-model.yml and
#    ci-recurrence-app.yml (the three subdir packages never overlap). Mirrors
#    ci-recurrence-model.yml.
#
#####################################################################################################################################################################################################

name: CI — juniper-recurrence-client

on:
  push:
    branches: [main, develop, "feature/**", "feat/**", "fix/**", "chore/**"]
    paths:
      - "juniper-recurrence-client/**"
      - ".github/workflows/ci-recurrence-client.yml"
  pull_request:
    branches: [main]
    paths:
      - "juniper-recurrence-client/**"
      - ".github/workflows/ci-recurrence-client.yml"
  workflow_dispatch:

concurrency:
  # Cancel superseded in-flight runs of THIS workflow on the same ref. Keyed on
  # github.workflow so each path-scoped CI lane has its own group (lanes never
  # cancel each other); the publish workflows are deliberately excluded.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: juniper-recurrence-client
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install --upgrade "pip>=26.1.1" ruff

      - name: Ruff lint
        run: ruff check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    defaults:
      run:
        working-directory: juniper-recurrence-client
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test extras
        run: pip install --upgrade "pip>=26.1.1" && pip install -e ".[test]"

      - name: Run unit tests with coverage
        run: |
          python -m pytest --cov=juniper_recurrence_client --cov-report=term-missing --cov-fail-under=90

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: juniper-recurrence-client
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build --sdist --wheel

      - name: Validate distribution metadata
        run: twine check dist/*

      - name: Smoke-test the built wheel (clean-venv import)
        run: |
          set -euo pipefail
          # F13/CI-5: install the BUILT WHEEL into a throwaway venv and import it, so a missing
          # module / package-data / MANIFEST gap is caught here — the editable install +
          # ``twine check`` never import the shipped artifact. Mirrors juniper-ml ci-model-core.yml.
          python -m venv /tmp/rec-client-smoke
          /tmp/rec-client-smoke/bin/pip install --quiet --upgrade pip
          /tmp/rec-client-smoke/bin/pip install --quiet dist/juniper_recurrence_client-*.whl
          /tmp/rec-client-smoke/bin/python -c "import juniper_recurrence_client as m; print('import OK', m.__version__); assert m.JuniperRecurrenceClient is not None"

  required-checks:
    name: Required checks
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, test, build]
    steps:
      - name: Verify required jobs succeeded
        run: |
          echo "Lint:  ${{ needs.lint.result }}"
          echo "Test:  ${{ needs.test.result }}"
          echo "Build: ${{ needs.build.result }}"
          if [[ "${{ needs.lint.result }}" != "success" \
             || "${{ needs.test.result }}" != "success" \
             || "${{ needs.build.result }}" != "success" ]]; then
            echo "::error::one or more required jobs did not succeed"
            exit 1
          fi
          echo "All required checks passed."

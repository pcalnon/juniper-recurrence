---
#####################################################################################################################################################################################################
# Project:       Juniper
# Application:   juniper-recurrence (repo root, bench/ harness — Δt-thesis benchmark suite)
# File Name:     ci-recurrence-bench.yml
# Author:        Paul Calnon
#
# Date Created:  2026-06-21
#
# License:       MIT License
# Copyright:     Copyright (c) 2026 Paul Calnon
#
# Description:
#    CI pipeline for the bench/ evaluation harness (the Δt-proof benchmark smoke
#    suite). The harness is a standalone, unpublished directory at the repo root
#    (import name `bench`), so it is gated by its own path-scoped workflow rather
#    than a sub-package CI. The job installs the app's [test,bench] extras — which
#    resolve juniper-recurrence-model, juniper-model-core[crossval], and the
#    juniper-data generators from PyPI — then runs the suite from the checkout root
#    so `import bench` resolves. Closes audit finding TST-1: bench/test_bench_smoke.py
#    (6 tests guarding the Δt thesis) previously ran in no CI lane, because the app
#    CI runs in working-directory juniper-recurrence/ with testpaths=["tests"] and
#    bench/ is a sibling of that directory.
#
#####################################################################################################################################################################################################

name: CI — bench harness

on:
  push:
    # Parity with the per-package ci-recurrence-*.yml lanes (audit CI-04): the bench lane previously
    # push-triggered only on main, so bench changes on a working branch got no push CI before the PR.
    branches: [main, develop, "feature/**", "feat/**", "fix/**", "chore/**"]
    paths:
      - "bench/**"
      - ".github/workflows/ci-recurrence-bench.yml"
  pull_request:
    branches: [main]
    paths:
      - "bench/**"
      - ".github/workflows/ci-recurrence-bench.yml"
  workflow_dispatch:

concurrency:
  # Cancel superseded in-flight runs of THIS workflow on the same ref. Keyed on
  # github.workflow so each path-scoped CI lane has its own group (lanes never
  # cancel each other); the publish workflows are deliberately excluded.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Bench smoke (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      # bench/ is imported from the checkout root (not installed); its runtime deps
      # come from the app's [bench] extra (juniper-data generators) plus the app's
      # own pins (juniper-recurrence-model, juniper-model-core[crossval]) and [test]
      # (pytest). Installing the app from its subdirectory resolves all of these from
      # PyPI; the harness code itself stays at the repo root.
      - name: Install app extras for the bench harness
        run: |
          pip install --upgrade "pip>=26.1.1"
          pip install "./juniper-recurrence[test,bench]"

      # Run from the repo root (python -m puts the cwd on sys.path so `import bench`
      # resolves); -p no:dash/playwright is the ecosystem-standard autoload-SIGSEGV
      # guard. test_bench_smoke.py importorskips juniper_data, which the [bench]
      # extra provides, so the suite actually executes rather than skipping.
      - name: Run bench smoke suite
        run: python -m pytest bench/ -ra -p no:dash -p no:playwright

  # Branch-protection-stable aggregate (audit CI-07): the matrix `test` job fans out to one check per
  # Python version, whose names shift when the matrix changes -- awkward to pin as required checks. This
  # single job depends on the whole matrix (a matrix job's `result` is `success` only when every leg
  # succeeds), so branch protection can require one stable check for the bench lane. `if: always()` so
  # it runs even when `test` fails and reports that failure rather than being skipped. Mirrors the
  # `required-checks` aggregate in ci-recurrence-app.yml; named distinctly so the two never collide.
  required-checks:
    name: Bench required checks
    runs-on: ubuntu-latest
    if: always()
    needs: [test]
    steps:
      - name: Verify the bench smoke matrix succeeded
        run: |
          echo "Bench smoke: ${{ needs.test.result }}"
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "The bench smoke suite did not succeed."
            exit 1
          fi
          echo "All bench required checks passed."

---
#####################################################################################################################################################################################################
# Project:       Juniper
# Application:   juniper-recurrence (application subdirectory of juniper-recurrence)
# File Name:     ci-recurrence-app.yml
# Author:        Paul Calnon
#
# Date Created:  2026-06-16
#
# License:       MIT License
# Copyright:     Copyright (c) 2026 Paul Calnon
#
# Description:
#    CI pipeline for the juniper-recurrence application package (the FastAPI + CLI
#    service). Runs on PRs and pushes that touch the app subdirectory or this
#    workflow. The model package has its own ci-recurrence-model.yml; the two are
#    path-scoped so they gate independently (``juniper-recurrence/**`` vs
#    ``juniper-recurrence-model/**`` never overlap). Mirrors ci-recurrence-model.yml.
#
#####################################################################################################################################################################################################

name: CI — juniper-recurrence-app

on:
  push:
    branches: [main, develop, "feature/**", "feat/**", "fix/**", "chore/**"]
    paths:
      - "juniper-recurrence/**"
      - ".github/workflows/ci-recurrence-app.yml"
  pull_request:
    branches: [main]
    paths:
      - "juniper-recurrence/**"
      - ".github/workflows/ci-recurrence-app.yml"
  workflow_dispatch:

concurrency:
  # Cancel superseded in-flight runs of THIS workflow on the same ref. Keyed on
  # github.workflow so each path-scoped CI lane has its own group (lanes never
  # cancel each other); the publish workflows are deliberately excluded.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: juniper-recurrence
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install --upgrade "pip>=26.1.1" ruff

      - name: Ruff lint
        run: ruff check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    defaults:
      run:
        working-directory: juniper-recurrence
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test extras
        run: pip install --upgrade "pip>=26.1.1" && pip install -e ".[test,observability]"

      - name: Run unit tests with coverage
        run: |
          python -m pytest --cov=juniper_recurrence --cov-report=term-missing --cov-fail-under=90

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: juniper-recurrence
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build --sdist --wheel

      - name: Validate distribution metadata
        run: twine check dist/*

      - name: Smoke-test the built wheel (clean-venv import)
        run: |
          set -euo pipefail
          # F13/CI-5: install the BUILT WHEEL into a throwaway venv and import it — incl. the
          # FastAPI app factory — so a missing module / package-data / MANIFEST gap is caught
          # here. The editable install + ``twine check`` never import the shipped artifact.
          # Mirrors juniper-ml ci-model-core.yml.
          python -m venv /tmp/rec-app-smoke
          /tmp/rec-app-smoke/bin/pip install --quiet --upgrade pip
          /tmp/rec-app-smoke/bin/pip install --quiet dist/juniper_recurrence-*.whl
          /tmp/rec-app-smoke/bin/python -c "import juniper_recurrence as m; from juniper_recurrence.app import build_app; print('import OK', m.__version__); assert build_app is not None"

  docker:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: juniper-recurrence
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build image
        run: docker build -t juniper-recurrence:ci .

      - name: Smoke test — serve + /v1/health
        run: |
          docker run -d --name rec-ci -p 8210:8210 juniper-recurrence:ci
          # The app imports a heavy pure-Python stack (service-core, model-core,
          # recurrence-model, data-client, numpy, fastapi) — ~10-15s — before
          # uvicorn binds, so retry generously. --retry-all-errors also retries
          # non-2xx; -f makes curl exit non-zero if /v1/health never returns 200.
          if ! curl --retry 60 --retry-delay 1 --retry-connrefused --retry-all-errors -fsS \
                 http://localhost:8210/v1/health; then
            echo "::error::recurrence container did not become healthy"
            docker logs rec-ci || true
            docker rm -f rec-ci || true
            exit 1
          fi
          echo ""
          echo "smoke test OK: /v1/health -> 200"
          docker rm -f rec-ci

  required-checks:
    name: Required checks
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, test, build, docker]
    steps:
      - name: Verify required jobs succeeded
        run: |
          echo "Lint:   ${{ needs.lint.result }}"
          echo "Test:   ${{ needs.test.result }}"
          echo "Build:  ${{ needs.build.result }}"
          echo "Docker: ${{ needs.docker.result }}"
          if [[ "${{ needs.lint.result }}" != "success" \
             || "${{ needs.test.result }}" != "success" \
             || "${{ needs.build.result }}" != "success" \
             || "${{ needs.docker.result }}" != "success" ]]; then
            echo "::error::one or more required jobs did not succeed"
            exit 1
          fi
          echo "All required checks passed."

---
#####################################################################################################################################################################################################
# Project:       Juniper
# Application:   juniper-recurrence (application subdirectory of juniper-recurrence)
# File Name:     publish-recurrence-app.yml
# Author:        Paul Calnon
#
# Date Created:  2026-06-16
#
# License:       MIT License
# Copyright:     Copyright (c) 2026 Paul Calnon
#
# Description:
#    GitHub Actions publish pipeline for the juniper-recurrence APPLICATION package.
#    Triggered by tags matching ``juniper-recurrence-v*`` so it stays decoupled from
#    the model package's ``juniper-recurrence-model-v*`` release tags. Publishes to
#    TestPyPI first (with install verification), then PyPI, via OIDC trusted
#    publishing. Mirrors publish-recurrence-model.yml.
#
#    TRUSTED-PUBLISHER REGISTRATION (must exist before the first tag push):
#      PyPI + TestPyPI -> add a pending publisher with:
#        owner       = pcalnon
#        repository  = juniper-recurrence
#        workflow    = publish-recurrence-app.yml
#        environment = pypi   (PyPI)   /   testpypi  (TestPyPI)
#
#    SECURITY (TestPyPI verify): the install-verification step resolves the published
#    package from TestPyPI ONLY (--no-deps, single --index-url, no production-PyPI
#    fallback) so a squatted production-PyPI package can never be resolved in its place
#    during a trusted publish. The juniper_recurrence top-level import is intentionally
#    dependency-free (only ``__version__`` is exposed eagerly; the FastAPI app lives in
#    juniper_recurrence.app), so the --no-deps import smoke needs no runtime deps
#    installed at all. TestPyPI index lag is handled by the retry loop.
#
#####################################################################################################################################################################################################

name: Publish juniper-recurrence to PyPI

on:
  push:
    tags:
      - "juniper-recurrence-v*"
  # Manual dispatch so operators can re-fire a publish against any tag.
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Build + validate the package before publishing
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: juniper-recurrence
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build --sdist --wheel

      - name: Validate distribution metadata
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: juniper-recurrence-dist
          path: juniper-recurrence/dist/
          if-no-files-found: error
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Publish to TestPyPI first; verify install before promoting to PyPI
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/juniper-recurrence
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: juniper-recurrence-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          verbose: true

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: |
            juniper-recurrence/juniper_recurrence/_version.py

      - name: Verify install from TestPyPI
        run: |
          set -euo pipefail
          version=$(grep -E '^__version__' juniper-recurrence/juniper_recurrence/_version.py | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Verifying juniper-recurrence==${version}"
          # SECURITY: resolve the published package from TestPyPI ONLY (--no-deps,
          # single --index-url, no production-PyPI fallback) so a squatted
          # production-PyPI package can never be resolved in its place during a
          # trusted publish. TestPyPI index lag is covered by the retry loop.
          for attempt in 1 2 3 4 5; do
            if pip install \
              --no-deps \
              --index-url https://test.pypi.org/simple/ \
              "juniper-recurrence==${version}"; then
              break
            fi
            echo "TestPyPI index lag — retrying in 10s (attempt ${attempt}/5)"
            sleep 10
          done
          # The juniper_recurrence top-level import is dependency-free (only
          # __version__ is exposed eagerly), so no runtime deps need installing for
          # this --no-deps smoke. (The FastAPI app + its deps are exercised in CI.)
          python -c "import juniper_recurrence; print('TestPyPI install OK', juniper_recurrence.__version__)"

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/juniper-recurrence
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: juniper-recurrence-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: dist/
          verbose: true

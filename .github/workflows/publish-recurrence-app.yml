---
#####################################################################################################################################################################################################
# Project:       Juniper
# Application:   juniper-recurrence (application subdirectory of juniper-recurrence)
# File Name:     publish-recurrence-app.yml
# Author:        Paul Calnon
#
# Date Created:  2026-06-16
#
# License:       MIT License
# Copyright:     Copyright (c) 2026 Paul Calnon
#
# Description:
#    GitHub Actions publish pipeline for the juniper-recurrence APPLICATION package.
#    Triggered by tags matching ``juniper-recurrence-v*`` so it stays decoupled from
#    the model package's ``juniper-recurrence-model-v*`` release tags. Publishes to
#    TestPyPI first (with install verification), then PyPI, via OIDC trusted
#    publishing. Mirrors publish-recurrence-model.yml.
#
#    TRUSTED-PUBLISHER REGISTRATION (must exist before the first tag push):
#      PyPI + TestPyPI -> add a pending publisher with:
#        owner       = pcalnon
#        repository  = juniper-recurrence
#        workflow    = publish-recurrence-app.yml
#        environment = pypi   (PyPI)   /   testpypi  (TestPyPI)
#
#    SECURITY (TestPyPI verify): the install-verification step resolves the published
#    package from TestPyPI ONLY (--no-deps, single --index-url, no production-PyPI
#    fallback) so a squatted production-PyPI package can never be resolved in its place
#    during a trusted publish. The juniper_recurrence top-level import is intentionally
#    dependency-free (only ``__version__`` is exposed eagerly; the FastAPI app lives in
#    juniper_recurrence.app), so the --no-deps import smoke needs no runtime deps
#    installed at all. TestPyPI index lag is handled by the retry loop.
#
#####################################################################################################################################################################################################

name: Publish juniper-recurrence to PyPI

on:
  # Publish ONLY on a cut GitHub Release (the ratified convention — never a bare `git push <tag>`).
  # We deliberately do NOT subscribe to `push: tags`: cutting a Release also creates the tag, which
  # emits a `push: tags` event — subscribing to both fired TWO concurrent publish runs that raced the
  # immutable TestPyPI upload (one uploaded, the other 400'd "file already exists"; see juniper-ml#555).
  # The build job is tag-prefix-guarded below; `release: published` is the single publish path.
  release:
    types: [published]
  # Manual dispatch so operators can re-fire a publish (e.g. after a transient failure).
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  # Belt-and-suspenders serialization keyed on the ref. The primary dedupe is the single
  # `release: published` trigger above; `skip-existing` on the publish steps makes any residual
  # overlap (e.g. a manual dispatch during a release) a no-op rather than an immutable-upload race.
  group: publish-recurrence-app-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Build + validate the package before publishing
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  build:
    name: Build and Validate
    # For a `release` event, run only when the release is THIS package's tag. Both sibling packages in
    # this repo share the `juniper-recurrence-` prefix, so the `-v` discriminator is load-bearing:
    # `juniper-recurrence-v` does NOT match `juniper-recurrence-client-v*` (next char `c`) or
    # `juniper-recurrence-model-v*` (next char `m`). Those sibling releases also fire this workflow and
    # are skipped here. workflow_dispatch always runs. Downstream jobs `needs: build`, so this one
    # guard gates the whole pipeline.
    if: github.event_name != 'release' || startsWith(github.event.release.tag_name, 'juniper-recurrence-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: juniper-recurrence
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Release-convention gate: a tag-triggered publish only proceeds when a GitHub Release exists
      # for the tag (publish by cutting a Release, never a bare `git push <tag>`). workflow_dispatch
      # skips this as the manual escape hatch.
      - name: Require a GitHub Release for this tag
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          for attempt in 1 2 3 4 5; do
            if gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json tagName >/dev/null 2>&1; then
              echo "GitHub Release found for $tag — proceeding."
              exit 0
            fi
            echo "No GitHub Release for $tag yet — retrying in 5s (attempt $attempt/5)"
            sleep 5
          done
          echo "::error::No GitHub Release exists for tag $tag. Per the release convention, publish by cutting a GitHub Release (gh release create $tag ...), not a bare tag push. Use workflow_dispatch to override."
          exit 1

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build --sdist --wheel

      - name: Validate distribution metadata
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: juniper-recurrence-dist
          path: juniper-recurrence/dist/
          if-no-files-found: error
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Publish to TestPyPI first; verify install before promoting to PyPI
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/juniper-recurrence
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: juniper-recurrence-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          verbose: true
          skip-existing: true  # tolerate an already-uploaded immutable artifact (re-run)

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          sparse-checkout: |
            juniper-recurrence/juniper_recurrence/_version.py

      - name: Verify install from TestPyPI
        run: |
          set -euo pipefail
          version=$(grep -E '^__version__' juniper-recurrence/juniper_recurrence/_version.py | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Verifying juniper-recurrence==${version}"
          # SECURITY: resolve the published package from TestPyPI ONLY (--no-deps,
          # single --index-url, no production-PyPI fallback) so a squatted
          # production-PyPI package can never be resolved in its place during a
          # trusted publish. TestPyPI index lag is covered by the retry loop.
          for attempt in 1 2 3 4 5; do
            if pip install \
              --no-deps \
              --index-url https://test.pypi.org/simple/ \
              "juniper-recurrence==${version}"; then
              break
            fi
            echo "TestPyPI index lag — retrying in 10s (attempt ${attempt}/5)"
            sleep 10
          done
          # The juniper_recurrence top-level import is dependency-free (only
          # __version__ is exposed eagerly), so no runtime deps need installing for
          # this --no-deps smoke. (The FastAPI app + its deps are exercised in CI.)
          python -c "import juniper_recurrence; print('TestPyPI install OK', juniper_recurrence.__version__)"

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/juniper-recurrence
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: juniper-recurrence-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: dist/
          verbose: true
          skip-existing: true  # tolerate an already-uploaded immutable artifact (re-run)

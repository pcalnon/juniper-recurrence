---
#####################################################################################################################################################################################################
# Project:       Juniper
# Application:   juniper-recurrence (all published sub-packages: app, model, client)
# File Name:     security-scan.yml
# Author:        Paul Calnon
#
# Date Created:  2026-06-21
#
# License:       MIT License
# Copyright:     Copyright (c) 2026 Paul Calnon
#
# Description:
#    Weekly dependency-vulnerability scan (pip-audit) for the three published
#    packages in this monorepo. Each package runs in its own matrix leg (fail-fast
#    off) so a vulnerability in one dependency tree is isolated and reported
#    independently. Mirrors juniper-ml/security-scan.yml. Closes audit finding CI-3
#    (the repo ships three PyPI packages with no dependency scanning). --skip-editable
#    avoids the PEP 660 editable-self-install pip-audit failure (the local package is
#    not on PyPI); every real third-party dependency is still audited.
#
#####################################################################################################################################################################################################

name: Scheduled Security Scan

on:
  schedule:
    - cron: "0 6 * * 1"  # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    name: pip-audit (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - juniper-recurrence
          - juniper-recurrence-model
          - juniper-recurrence-client
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install package + pip-audit
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install pip-audit
          pip install -e .

      - name: Run pip-audit (dependency vulnerabilities)
        run: pip-audit --strict --desc on --skip-editable

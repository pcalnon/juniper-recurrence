[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "juniper-recurrence"
dynamic = ["version"]
description = "FastAPI + CLI service wrapping the Δt-native LMU recurrence model on the juniper-service-core framework"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Paul Calnon" }]
keywords = ["juniper", "recurrence", "lmu", "fastapi", "time-series", "irregular-dt", "model-service"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: FastAPI",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

# Real runtime deps. All upstreams are published to PyPI (juniper-model-core 0.2.0,
# juniper-service-core 0.1.0, juniper-recurrence-model 0.1.2, juniper-data-client
# 0.4.2), so the app pins them directly — no editable-sibling / cross-repo-clone
# step is required (plan §10 publish-first end-state). The /v1/crossval endpoint pulls
# juniper-model-core's optional [crossval] extra; juniper-recurrence-model>=0.1.2 is the
# release that admits model-core 0.2.0 (publish-first: 0.1.2 must reach PyPI first).
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.30",
    "pydantic>=2.0",
    "pydantic-settings>=2.2",
    "numpy>=1.24",
    "juniper-service-core>=0.1.0,<0.2.0",
    "juniper-model-core[crossval]>=0.2.0,<0.3.0",
    "juniper-recurrence-model>=0.1.2,<0.2.0",
    "juniper-data-client>=0.4.2,<0.5.0",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "httpx>=0.27",  # required by fastapi/starlette TestClient
]
# Prometheus /metrics + MetricsAuthMiddleware (design doc
# JUNIPER_RECURRENCE_METRICS_ENDPOINT_DESIGN_2026-06-18.md). The >=0.4.0 floor
# provides set_build_info; app.py guards this import so the app still runs when
# the extra is absent (/metrics is simply not mounted).
observability = [
    # [prometheus] pulls prometheus-client — juniper-observability keeps it optional,
    # so the bare package would ModuleNotFoundError at /metrics scrape time (mirrors
    # juniper-data's observability extra).
    "juniper-observability[prometheus]>=0.4.0",
]

[project.scripts]
juniper-recurrence = "juniper_recurrence.main:main"

[project.urls]
Homepage = "https://github.com/pcalnon/juniper-recurrence"
Repository = "https://github.com/pcalnon/juniper-recurrence"
Issues = "https://github.com/pcalnon/juniper-recurrence/issues"

[tool.setuptools.dynamic]
version = { attr = "juniper_recurrence._version.__version__" }

[tool.setuptools.packages.find]
include = ["juniper_recurrence*"]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = ["-ra", "-q", "--strict-markers", "--strict-config"]

[tool.ruff]
line-length = 512
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "B", "I", "N"]

[tool.ruff.lint.per-file-ignores]
# ``X`` is the standard ML design-matrix name (juniper-model-core's array contract);
# pep8-naming N806's lowercase rule is a false positive on it (mirrors the model package).
"tests/conftest.py" = ["N806"]
"tests/test_crossval_routes.py" = ["N806"]
